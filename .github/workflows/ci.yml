name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autodev
          POSTGRES_PASSWORD: autodev
          POSTGRES_DB: autodev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autodev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run ruff formatter check
        run: uv run ruff format --check .

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: autodev
          DB_USER: autodev
          DB_PASSWORD: autodev
          DATABASE_URL: postgresql+asyncpg://autodev:autodev@localhost:5432/autodev
        run: |
          uv run pytest -v --tb=short \
            --ignore=tests/test_pm_api.py \
            --ignore=tests/test_queue.py \
            --ignore=tests/test_metrics.py \
            --ignore=tests/test_pm.py \
            --ignore=tests/test_release_manager.py \
            --ignore=tests/test_state.py \
            --ignore=tests/test_github_import.py \
            --ignore=tests/test_github.py \
            --ignore=tests/test_api.py \
            -k "not test_task_status_values and not test_enum_iteration"
