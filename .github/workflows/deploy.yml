name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/zinchenkomig/autodev-api
  DASHBOARD_IMAGE: ghcr.io/zinchenkomig/autodev-dashboard

jobs:
  # Run CI first
  ci:
    uses: ./.github/workflows/ci.yml

  # Build and push Docker images
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

  # Deploy to k8s via SSH
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            kubectl -n autodev set image deploy/autodev-api autodev-api=${{ env.API_IMAGE }}:${{ github.sha }}
            kubectl -n autodev set image deploy/autodev-dashboard dashboard=${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            kubectl -n autodev rollout status deploy/autodev-api --timeout=120s
            kubectl -n autodev rollout status deploy/autodev-dashboard --timeout=120s
            echo "✅ Deployed commit ${{ github.sha }}"
