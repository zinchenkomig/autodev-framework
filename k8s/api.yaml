apiVersion: apps/v1
kind: Deployment
metadata:
  name: autodev-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autodev-api
  template:
    metadata:
      labels:
        app: autodev-api
    spec:
      containers:
      - name: autodev-api
        image: autodev-api
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://autodev:autodev@postgres-postgresql:5432/autodev"
        - name: REDIS_URL
          value: "redis://redis-master:6379/0"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: autodev-api
spec:
  selector:
    app: autodev-api
  ports:
  - port: 8000
    targetPort: 8000
